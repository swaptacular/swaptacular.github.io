# Dependencies
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# Permalinks
permalink: pretty

# Setup
title: Swaptacular
tagline: 'Money doing the right thing'
description: >
  Money that works for the community, not the other way around.
url: http://swaptacular.github.io

paginate: 10
paginate_path: "/blog/page:num/"

excerpt_separator: '<!--more-->'

exclude:
  - synfig

feed:
  excerpt_only: true
  posts_limit: 10

# Custom vars
version: 2.1.0

app_demo:
  debtors_webapp: https://demo.swaptacular.org/debtors-webapp
  creditors_webapp: https://demo.swaptacular.org/creditors-webapp
  map_url: https://www.google.com/maps/d/viewer?mid=1kxVdxDvNABXMt9JSb92k_v0dpp9nf4c&usp=sharing

mailing_list:
  url: https://groups.io/g/swaptacular

github:
  repo: https://github.com/swaptacular
  utterances_repo_path: swaptacular/swaptacular.github.io
  discussions_url: https://github.com/orgs/swaptacular/discussions

maintainer:
  obfuscated_email: postmaster [at] swaptacular [dot] org

analytics:
  rybbit:
    data_site_id: 88da4ed3a101
