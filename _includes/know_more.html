<div>
  <h2>Want to know more?</h2>
  <ul class="related-posts">
  {% for node in site.tags.intro %}
    {% unless node.tags contains 'overview' %}
      <li>
        <h3>
          <a href="{{ node.url }}">
            {{ node.title }}
          </a>
          <small>{{ node.date | date_to_string }}</small>
        </h3>
      </li>
    {% endunless %}
  {% endfor %}
  </ul>
</div>
